<html>
 <head>
<meta charset="utf-8" />
 <style type="text/css">
 body{
 background-color: rgb(255,192,220);
 text-align : center;
 margin : 50px;
}
div {
background : rgb(100,128,255);
 width : 400px;
 border : 3px black solid;
 }
h1 {
 margin : 20px;
 border-bottom: 3px dotted blue;
 border-top: 3px dashed blue;
 border-left: 3px solid blue;
 border-right: 3px double blue;
 background : rgb(255,255,0);
 }
 h2{
 margin : 10px;
 border-bottom: 3px groove blue;
 border-top: 3px ridge orange;
 border-left: 3px inset yellow;
 border-right: 3px inset blue;
 background : rgb(205,92,92);
 }
h3{
 margin : 15px;
 border : 3px solid black;
 background : rgb(100,149,237);
}
 </style>
 </head>
<body>
<div><h1>Kurowska, 1KP</h1></div>
<hr width="80%" size="14px" color="blue" align="left">
<div><h2>Kurowska, 1KP</h2></div>
<hr width="80%" size="24px" color="red" align="left">
<div><h3>Kurowska, 1KP</h3></div>
<hr width="80%" size="34px" color="yellow" align="left">
</body>
</html>
<!-- Ksenia Kurowska -->
